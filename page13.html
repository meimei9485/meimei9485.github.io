                            <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok视频洞察</title>
    <style>
        /* =========================================================
           全局重置与视口控制
           ========================================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #eef0f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* 全局坚决零溢出 */
            padding: 1vw;
        }

        /* =========================================================
           核心容器：16:9 画布刚性锁定
           ========================================================= */
        .ppt-canvas {
            width: 100%;
            max-width: 1600px;
            aspect-ratio: 16 / 9;
            max-height: 98vh;
            background: #ffffff;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 2.5%;
            gap: 3%;
        }

        /* =========================================================
           标题栏区
           ========================================================= */
        .ppt-header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #f1f3f5;
            padding-bottom: 1.5%;
        }

        .ppt-header h1 {
            font-size: clamp(1.4rem, 2vw, 2.2rem);
            color: #111827;
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
            padding-left: 18px;
        }

        .ppt-header h1::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 80%;
            background: #2563eb;
            border-radius: 4px;
        }

        /* =========================================================
           主体内容区
           ========================================================= */
        .ppt-content {
            flex: 1 1 0;
            min-height: 0; 
            display: flex;
            flex-direction: column;
            gap: 2%; 
        }

        /* --- 媒体横列（视频/图片排在一排） --- */
        .media-row {
            flex: 1 1 0;
            display: flex;
            gap: 1.5%; 
            min-height: 0;
        }

        .card {
            flex: 1 1 0; 
            background: #fafafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            animation: slideUpFade 0.6s ease forwards;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            border-color: #d1d5db;
        }

        /* 安全容器，提供留白防割裂 */
        .media-box {
            flex: 1 1 0;
            min-height: 0;
            position: relative;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 3%; 
        }

        /* 核心：确保内容完整全貌，绝对不遮拦裁剪 */
        .media-box video, 
        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            border-radius: 4px;
        }

        /* 数据文字条 */
        .text-bar {
            flex: 0 0 auto;
            padding: 4% 5%;
            background: #ffffff;
            color: #374151;
            font-size: clamp(0.9rem, 1.1vw, 1.1rem); 
            font-weight: 600;
            text-align: center;
            border-top: 1px solid #e5e7eb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- 底部结论 Banner --- */
        .solution-banner {
            flex: 0 0 auto;
            background: #eff6ff; 
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 1.5% 3%;
            display: flex;
            align-items: center;
            gap: 2%;
            border-left: 6px solid #2563eb;
            
            opacity: 0;
            animation: slideUpFade 0.6s ease forwards;
            animation-delay: 0.5s;
        }

        .solution-label {
            background-color: #2563eb;
            color: #ffffff;
            font-size: clamp(0.7rem, 0.9vw, 1rem);
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .solution-banner h2 {
            color: #0f172a;
            font-size: clamp(1.2rem, 1.8vw, 1.6rem); 
            font-weight: 700;
            margin: 0;
        }

        /* =========================================================
           出场微动画
           ========================================================= */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 依次展示呈现高级PPT效果 */
        .media-row .card:nth-child(1) { animation-delay: 0.1s; }
        .media-row .card:nth-child(2) { animation-delay: 0.2s; }
        .media-row .card:nth-child(3) { animation-delay: 0.3s; }
        .media-row .card:nth-child(4) { animation-delay: 0.4s; }

    </style>
</head>
<body>

    <div class="ppt-canvas">
        
        <!-- 恒定标题区 -->
        <header class="ppt-header">
            <h1>TikTok视频洞察</h1>
        </header>

        <!-- 布局容器 -->
        <main class="ppt-content">
            
            <!-- 大矩阵列：4图一字排列 -->
            <section class="media-row">
                
                <!-- 视频1 -->
                <div class="card">
                    <div class="media-box">
                        <video src="https://packaged-media.redd.it/0hmspibwat6h1/pb/m2-res_640p.mp4?m=DASHPlaylist.mpd&c=wh_ben_en&var=sgpssan&v=1&e=1781276400&s=690de789ddc211ee75e3b3aad9dc1932eda9e305" autoplay loop muted playsinline></video>
                    </div>
                    <div class="text-bar">撕膜困难，用时6秒</div>
                </div>

                <!-- 视频2 -->
                <div class="card">
                    <div class="media-box">
                        <video src="https://packaged-media.redd.it/wfvdomyqat6h1/pb/m2-res_1920p.mp4?m=DASHPlaylist.mpd&c=wh_ben_en&var=sgpssan&v=1&e=1781276400&s=b40760c6feaef99e09d0c18f2ab4556e723ae4e5" autoplay loop muted playsinline></video>
                    </div>
                    <div class="text-bar">撕膜困难，用时5秒</div>
                </div>

                <!-- 视频3 -->
                <div class="card">
                    <div class="media-box">
                        <video src="https://packaged-media.redd.it/b54avzjmat6h1/pb/m2-res_1920p.mp4?m=DASHPlaylist.mpd&c=wh_ben_en&var=sgpssan&v=1&e=1781276400&s=d684af6ebd526a7eeb7d5b29a19796fb2919cbcf" autoplay loop muted playsinline></video>
                    </div>
                    <div class="text-bar">揭膜困难，用时3秒</div>
                </div>

                <!-- 图片4 -->
                <div class="card">
                    <div class="media-box">
                        <!-- alt 属性已更新 -->
                        <img src="https://wp-cdn.4ce.cn/v2/8rENtXk.png" alt="手机保护膜—剥离标">
                    </div>
                    <!-- 描述文字已更新 -->
                    <div class="text-bar">手机保护膜—剥离标</div>
                </div>

            </section>

            <!-- 底部：结论 Banner -->
            <section class="solution-banner">
                <div class="solution-label">Solution / 解决方案</div>
                <h2>添加提拉耳挂，实现1秒揭膜</h2>
            </section>

        </main>
        
    </div>

</body>
</html>

                            <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离型纸立项</title>
    <style>
        /* =========================================================
           基础重置与视口控制 
           ========================================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #f0f2f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* =========================================================
           核心容器：严格 16:9 比例与防溢出
           ========================================================= */
        .slide-container {
            aspect-ratio: 16 / 9;
            width: 100%;
            max-width: 1600px;
            max-height: 98vh;
            min-height: 0;
            background-color: #ffffff; 
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08); 
            overflow: hidden; 
            display: flex;
            justify-content: center; 
            align-items: center;     
        }

        /* =========================================================
           背景细节：还原图片中极淡的氛围圈，充盈 16:9 空间
           ========================================================= */
        .bg-decoration {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(100, 120, 250, 0.04); 
            pointer-events: none; 
            z-index: 1;
        }

        /* 右上角大圆环组 */
        .circle-tr-1 {
            width: 80vw;
            height: 80vw;
            top: -40vw;
            right: -30vw;
            animation: breathe 12s infinite alternate ease-in-out;
        }
        
        .circle-tr-2 {
            width: 60vw;
            height: 60vw;
            top: -30vw;
            right: -20vw;
            border-width: 1.5px;
            border-color: rgba(100, 120, 250, 0.02);
            animation: breathe 15s infinite alternate-reverse ease-in-out;
        }

        /* 左下角小圆 */
        .circle-bl-1 {
            width: 35vw;
            height: 35vw;
            bottom: -15vw;
            left: -10vw;
            animation: breathe 10s infinite alternate ease-in-out;
        }

        /* 左上角极淡圆 */
        .circle-tl-1 {
            width: 50vw;
            height: 50vw;
            top: -25vw;
            left: -20vw;
            border-color: rgba(100, 120, 250, 0.03);
            animation: breathe 14s infinite alternate ease-in-out;
        }


        /* =========================================================
           中心内容排版区 
           ========================================================= */
        .content-box {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 主标题样式：修改为黑色 */
        .main-title {
            font-size: clamp(60px, 8vw, 130px); 
            font-weight: 900;
            letter-spacing: 0.05em;
            margin: 0;
            /* 修改 1：文字更新为更具高级感和阅读性的纯正深黑 */
            color: #111111; 
            /* 投影更新为适配黑色字体的中性极淡灰，保持立体剥离感 */
            filter: drop-shadow(0px 10px 20px rgba(0, 0, 0, 0.08));
            
            /* 入场动画保持不变 */
            opacity: 0;
            transform: translateY(20px);
            animation: title-reveal 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards;
        }

        /* 主标题下方的渐变短线：修改为薄荷蓝 */
        .accent-divider {
            width: 12%;       
            min-width: 80px;
            height: 6px;      
            margin-top: 35px; 
            border-radius: 4px;
            /* 修改 2：更新为清新亮眼的薄荷蓝渐变 */
            background: linear-gradient(90deg, #36d1c4 0%, #7cf0e6 100%);
            
            /* 入场动画保持不变 */
            transform-origin: center;
            transform: scaleX(0);
            animation: line-expand 0.8s cubic-bezier(0.8, 0, 0.2, 1) 0.8s forwards;
        }

        /* =========================================================
           动态关键帧 
           ========================================================= */
        @keyframes title-reveal {
            0% { 
                opacity: 0; 
                transform: translateY(30px) scale(0.98); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        @keyframes line-expand {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }

        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

    </style>
</head>
<body>

    <!-- 16:9 画板容器 -->
    <div class="slide-container">
        
        <!-- 大面积留白空间的几何弱装点 -->
        <div class="bg-decoration circle-tr-1"></div>
        <div class="bg-decoration circle-tr-2"></div>
        <div class="bg-decoration circle-tl-1"></div>
        <div class="bg-decoration circle-bl-1"></div>

        <!-- 中心视点组 -->
        <div class="content-box">
            <h1 class="main-title">离型纸立项</h1>
            <div class="accent-divider"></div>
        </div>

    </div>

</body>
</html>
